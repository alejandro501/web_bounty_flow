services:
  backend:
    container_name: web-bounty-flw-backend
    image: web-bounty-flw-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    ports:
      - "5050:8080"
    volumes:
      - ./data:/app/data
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - BFLOW_ADDR=:8080
      - DISPLAY=${DISPLAY:-:0}
    shm_size: "1gb"
  frontend:
    container_name: web-bounty-flw-frontend
    image: web-bounty-flw-frontend
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "5001:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
    depends_on:
      - backend
